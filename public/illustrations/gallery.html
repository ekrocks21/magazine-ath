<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ATH — Thumbnail Library</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body { background: var(--cream); padding: 64px 48px; }
  .page { max-width: 1400px; margin: 0 auto; }
  .masthead {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--rule); padding-bottom: 16px; margin-bottom: 8px;
  }
  .masthead h1 { font-family: var(--font-display); font-weight: 700; font-size: 2.4rem; color: var(--navy); }
  .masthead .meta { font-family: var(--font-mono); font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
  .rust-rule { height: 3px; background: var(--rust); margin-bottom: 24px; }
  .lede { font-family: var(--font-display); font-style: italic; color: var(--ink-soft); font-size: 1.15rem; max-width: 640px; margin-bottom: 48px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; }
  .card { background: var(--paper); border: 1px solid var(--border); }
  .thumb {
    width: 100%; aspect-ratio: 12 / 7; background: var(--cream-dark); display: block;
    object-fit: cover;
  }
  .caption {
    padding: 16px 20px 20px; border-top: 1px solid var(--border);
  }
  .kicker { font-family: var(--font-mono); font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--rust); display: block; margin-bottom: 4px; }
  .title { font-family: var(--font-display); font-weight: 600; font-size: 1.2rem; color: var(--ink); line-height: 1.3; }
  .dek { font-family: var(--font-body); font-size: .9rem; color: var(--muted); margin-top: 4px; }
  .filename { font-family: var(--font-mono); font-size: .65rem; color: var(--sand); margin-top: 8px; letter-spacing: .05em; }
</style>
</head>
<body>
<div class="page">
  <header class="masthead">
    <h1>Thumbnail Library</h1>
    <div class="meta">ATH · SPRING 2026 · 12 PLATES</div>
  </header>
  <div class="rust-rule"></div>
  <p class="lede">Twelve editorial illustrations in the house style — limited palette, archival texture, subject matter drawn from Sandy Hook, the Highlands, and New York Harbor. All 1200×700, sized to drop straight into feature cards or hero slots.</p>

  <div class="grid">

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/twin-lights.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Highlands · Navesink</span><div class="title">Twin Lights at Dusk</div><div class="dek">The brownstone towers above the river, seen from the beach road.</div><div class="filename">thumbs/twin-lights.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/sandy-hook-beach.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Sandy Hook · Ocean</span><div class="title">Beach & Shoreline</div><div class="dek">Wet sand, driftwood, a plover picking at the tideline.</div><div class="filename">thumbs/sandy-hook-beach.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/container-ship.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Shipping Lane</span><div class="title">Container Ship, Outbound</div><div class="dek">Stacked steel in eight colors, passing at golden hour.</div><div class="filename">thumbs/container-ship.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/sailboat-race.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Navesink River</span><div class="title">Three-Boat Reach</div><div class="dek">A sail number, a jib, a distant silhouette — standard racing composition.</div><div class="filename">thumbs/sailboat-race.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/nyc-skyline.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Lower Bay · Manhattan</span><div class="title">Skyline, Looking North</div><div class="dek">The harbor at sunset with a silhouetted boat in the foreground.</div><div class="filename">thumbs/nyc-skyline.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/highlands-night.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Highlands · Night</span><div class="title">Lighthouse Under Moon</div><div class="dek">Moonrise over the bay, the keeper's beam thrown offshore.</div><div class="filename">thumbs/highlands-night.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/fishing-boat.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Shrewsbury River</span><div class="title">The Miss Navesink</div><div class="dek">A working trawler leaving the municipal docks.</div><div class="filename">thumbs/fishing-boat.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/fort-hancock.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Sandy Hook · Fort Hancock</span><div class="title">Battery & Flagstaff</div><div class="dek">A disappearing-gun emplacement and the old garrison flag.</div><div class="filename">thumbs/fort-hancock.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/lobster-boat.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Working Boat</span><div class="title">Lobsterman in Fog</div><div class="dek">Traps stacked aft, pot hauler rigged, gulls waiting on the wire.</div><div class="filename">thumbs/lobster-boat.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/sandy-hook-lighthouse.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Sandy Hook · 1764</span><div class="title">The Oldest Lighthouse</div><div class="dek">Octagonal tower, beach walkers at low sun, distant sail.</div><div class="filename">thumbs/sandy-hook-lighthouse.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/highlands-bridge.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Route 36 · Shrewsbury</span><div class="title">The Highlands Bridge</div><div class="dek">Through-arch truss over the inlet at steady light.</div><div class="filename">thumbs/highlands-bridge.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/dock-dusk.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Private Pier · Navesink</span><div class="title">Dock at Dusk</div><div class="dek">Lantern, rowboat, a figure fishing. The evening light.</div><div class="filename">thumbs/dock-dusk.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/ferry-to-nyc.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Atlantic Highlands · Pier 11</span><div class="title">Seastreak, Inbound</div><div class="dek">The commuter ferry passing under the Verrazzano cables.</div><div class="filename">thumbs/ferry-to-nyc.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/harbor-chart.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Cartography</span><div class="title">A Chart of the Highlands Coast</div><div class="dek">Archival map style — peninsula, bay, shipping lane, compass rose.</div><div class="filename">thumbs/harbor-chart.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/winter-cargo.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Winter · Shipping</span><div class="title">Cargo in Ice</div><div class="dek">Snow dusting, pilot boat escort, ice breaking on the bow.</div><div class="filename">thumbs/winter-cargo.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/regatta.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Summer · Yacht Club</span><div class="title">Navesink Regatta</div><div class="dek">A tight cluster at the weather mark, numbers and spinnakers.</div><div class="filename">thumbs/regatta.svg</div></figcaption></figure>

    <figure class="card"><img class="thumb" src="ui_kits/ath-magazine/assets/thumbs/overlook.svg" alt=""/>
      <figcaption class="caption"><span class="kicker">Hartshorne Woods · Overlook</span><div class="title">Bench with a View</div><div class="dek">From the cliff: Sandy Hook below, the harbor, a passing ship.</div><div class="filename">thumbs/overlook.svg</div></figcaption></figure>

  </div>
</div>
</body>
</html>
