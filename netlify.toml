# magazine.abovethehook.com — Netlify config
# Same team as harbor + blog. Static site, no functions in Phase 1.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--prefer-offline --no-audit"

# Drafts never render on production deploys. See spec §3 / CLAUDE.md
# "status: draft in frontmatter means don't render publicly."
# The article rendering code reads this env var to decide.
[context.production.environment]
  PUBLIC_INCLUDE_DRAFTS = "false"
  # Analytics: Plausible. Set in Netlify dashboard rather than committed
  # here if you want to swap vendors without a PR. Leave unset to disable
  # analytics entirely (no script tag rendered).
  #   PUBLIC_ANALYTICS_DOMAIN = "magazine.abovethehook.com"
  #   PUBLIC_ANALYTICS_SCRIPT = "https://plausible.io/js/script.js"

# Preview deploys (any branch PR) render drafts so Eric can review them.
# Analytics are deliberately NOT set here so preview pageviews don't
# pollute production metrics.
[context.deploy-preview.environment]
  PUBLIC_INCLUDE_DRAFTS = "true"

[context.branch-deploy.environment]
  PUBLIC_INCLUDE_DRAFTS = "true"
